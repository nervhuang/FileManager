name: Notify test (manual)

on:
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack test message
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST -H 'Content-type: application/json' --data "{\"text\": \"Test message from repository: Slack notifications are configured.\"}" "${WEBHOOK}"