name: Python application

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: [3.11]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install PyQt5
          python -m pip install -r requirements-dev.txt
        env:
          # Use offscreen mode for Qt to avoid requiring a display
          QT_QPA_PLATFORM: offscreen

      - name: Run tests on Linux (xvfb)
        if: matrix.os == 'ubuntu-latest'
        run: xvfb-run -s "-screen 0 1024x768x24" pytest -q --junitxml=report.xml

      - name: Upload junit report (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml

      - name: Run tests on Windows
        if: matrix.os == 'windows-latest'
        run: pytest -q --junitxml=report.xml
        shell: powershell

      - name: Upload junit report (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: report.xml
