name: CI notify

on:
  workflow_run:
    workflows: ["Python application"]
    types: [completed]

permissions:
  issues: write
  pull-requests: write

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Download junit report artifact (if any)
        uses: actions/download-artifact@v4
        with:
          name: junit-report
          path: report || .

      - name: Summarize junit failures
        id: junit_summary
        run: |
          python - <<'PY'
import os, xml.etree.ElementTree as ET
out = {'failures':'0', 'failure_list':''}
path = os.path.join('report', 'report.xml')
if os.path.exists(path):
    tree = ET.parse(path)
    root = tree.getroot()
    failures = []
    for testcase in root.findall('.//testcase'):
        for child in testcase:
            if child.tag in ('failure','error'):
                failures.append(f"{testcase.get('classname','')}.{testcase.get('name')}")
    out['failures'] = str(len(failures))
    out['failure_list'] = ' | '.join(failures)
# write outputs
with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
    f.write(f"failures={out['failures']}\n")
    f.write(f"failure_list={out['failure_list']}\n")
PY

      - name: Post comment on associated PRs if any
        uses: actions/github-script@v6
        env:
          FAILURES: ${{ steps.junit_summary.outputs.failures }}
          FAILURE_LIST: ${{ steps.junit_summary.outputs.failure_list }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const run = context.payload.workflow_run;
            const conclusion = run.conclusion || 'unknown';
            const url = run.html_url;
            let body = `Workflow **${run.name}** completed with conclusion: **${conclusion}**. See details: ${url}`;
            const failures = parseInt(process.env.FAILURES || '0', 10);
            const failure_list = process.env.FAILURE_LIST || '';
            if (failures > 0) {
              body += `\n\n**Failed tests (${failures}):**\n` + failure_list;
            }

            // Find PRs associated with the run
            const prs = await github.rest.actions.listWorkflowRunPullRequests({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run.id
            });

            if (prs.data && prs.data.length) {
              for (const pr of prs.data) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body
                });
              }
            } else {
              // If no PRs, create an issue to notify (optional)
              console.log('No associated PRs; skipping comment.');
            }

      - name: Send Slack notification (optional)
        if: ${{ secrets.SLACK_WEBHOOK_URL }}
        env:
          RUN_NAME: ${{ github.event.workflow_run.name }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          URL: ${{ github.event.workflow_run.html_url }}
        run: |
          message="Workflow *${RUN_NAME}* completed with *${CONCLUSION}*. See details: ${URL}"
          curl -s -X POST -H 'Content-type: application/json' --data "{\"text\": \"${message}\"}" "${{ secrets.SLACK_WEBHOOK_URL }}"
